<!doctype html>
<html lang="pt-BR" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Impede que o navegador (especialmente iOS Safari / Chrome Android) tente
         interpretar/auto-linkar telefones, datas, endereços, emails ou "adivinhar"
         conteúdo nas páginas públicas de verificação (QR Code VIO). -->
    <meta name="format-detection" content="telephone=no, date=no, address=no, email=no" />
    <meta name="x-apple-disable-message-reformatting" content="" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- Impede tradução automática do Chrome/Google que altera siglas (GO→Go, Doc.→Doutor, Cat.→Gato, etc) -->
    <meta name="google" content="notranslate" />
    <meta http-equiv="Content-Language" content="pt-BR" />

    <!-- TODO: Set the document title to the name of your application -->
    <title>DataSistemas</title>
    <meta name="description" content="DataSistemas - Painel de Gestão" />
    <meta name="author" content="Data Sistemas" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <meta property="og:title" content="DataSistemas" />
    <meta property="og:description" content="DataSistemas - Painel de Gestão" />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />
  </head>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
